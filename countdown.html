<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daisuki Confeitaria — Seus bilhetes estão reservados!</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">

  <style>
    html { height: 100%; }

    body {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--cream);
      cursor: auto;
      overflow-x: hidden;
      padding: 4.5rem 1rem 2rem;
    }

    /* ── Grain overlay ───────────────────────────────────── */
    #grain-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 9999;
      mix-blend-mode: soft-light; opacity: 0.02;
    }

    /* ── Top bar ─────────────────────────────────────────── */
    .cd-top {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 1.1rem 1.8rem;
      z-index: 10;
    }

    .cd-back {
      font-family: var(--font-body); font-size: 0.58rem;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--rose); opacity: 0.55;
      text-decoration: none; transition: opacity 0.3s;
    }
    .cd-back:hover { opacity: 1; }

    .cd-nums-label {
      font-family: var(--font-body); font-size: 0.58rem;
      letter-spacing: 1.5px; color: var(--chocolate-mid);
      opacity: 0.4; text-align: right;
      max-width: 260px; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Main layout ─────────────────────────────────────── */
    .cd-main {
      display: flex; flex-direction: column;
      align-items: center; gap: clamp(0.6rem, 2vh, 1.4rem);
      width: 100%;
    }

    /* ── Brigadeiro imagem ──────────────────────────────── */
    .brigadeiro-wrap {
      position: relative;
    }

    #brigadeiro-img {
      display: block;
      border-radius: 50%;
      object-fit: cover;
      width: clamp(260px, 52vw, 480px);
      height: clamp(260px, 52vw, 480px);
      filter: drop-shadow(0 24px 64px rgba(44,24,16,0.28));
      user-select: none;
      -webkit-user-select: none;
      pointer-events: none;
    }

    .cd-drag-hint {
      position: absolute; bottom: -1.2rem; left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-body); font-size: 0.5rem;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--rose-light); white-space: nowrap;
      opacity: 0;
      animation: hintIn 0.8s ease 2s forwards;
    }
    @keyframes hintIn { to { opacity: 0.65; } }

    /* ── Countdown ───────────────────────────────────────── */
    .cd-countdown { text-align: center; }

    .cd-count-label {
      display: block;
      font-family: var(--font-body); font-size: 0.5rem;
      letter-spacing: 5px; text-transform: uppercase;
      color: var(--rose); opacity: 0.7;
      margin-bottom: 0.55rem;
    }

    .cd-digits {
      display: flex; align-items: flex-end;
      justify-content: center; gap: 0.1rem;
    }

    .cd-unit {
      display: flex; flex-direction: column;
      align-items: center; gap: 0.1rem;
    }

    .cd-val {
      font-family: var(--font-display);
      font-style: italic; font-weight: 300;
      font-size: clamp(2.8rem, 6.5vw, 5.2rem);
      color: var(--chocolate);
      line-height: 1; letter-spacing: -0.02em;
      min-width: 2.4ch; text-align: center;
      transition: transform 0.12s ease, color 0.12s ease;
      will-change: transform;
    }
    .cd-val.pop {
      transform: scale(1.08);
      color: var(--rose-dark);
    }

    .cd-lbl {
      font-family: var(--font-body); font-size: 0.42rem;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--rose); opacity: 0.65;
    }

    .cd-sep {
      font-family: var(--font-display); font-style: italic;
      font-size: clamp(2rem, 4.5vw, 3.5rem);
      color: var(--rose-light); line-height: 1;
      margin-bottom: 0.55rem; opacity: 0.5;
      padding: 0 0.1rem;
    }

    .cd-date {
      font-family: var(--font-body); font-size: 0.55rem;
      letter-spacing: 1.5px; color: var(--chocolate-mid);
      opacity: 0.38; margin-top: 0.5rem;
    }

    #cd-status-msg {
      display: block;
      font-family: var(--font-body); font-size: 0.78rem;
      color: var(--rose); margin-top: 0.6rem;
    }

    /* ── Login overlay ───────────────────────────────────── */
    #cd-login-overlay[hidden] { display: none !important; }

    #cd-login-overlay {
      position: fixed; inset: 0;
      background: var(--cream);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100; padding: 2rem;
      text-align: center;
    }

    .cd-login-logo {
      font-family: var(--font-display);
      font-size: 1.8rem; font-weight: 300;
      color: var(--chocolate);
      letter-spacing: -0.01em;
      margin-bottom: 2.5rem;
    }
    .cd-login-logo span { color: var(--rose); }

    .cd-login-card {
      background: rgba(253,250,246,0.92);
      border: 1px solid rgba(44,24,16,0.09);
      border-radius: 16px;
      padding: clamp(2rem, 5vw, 3rem) clamp(1.8rem, 5vw, 2.8rem);
      max-width: 400px; width: 100%;
      box-shadow: 0 8px 40px rgba(44,24,16,0.09);
    }

    .cd-login-title {
      font-family: var(--font-display);
      font-size: 1.6rem; font-weight: 400;
      color: var(--chocolate);
      margin-bottom: 0.4rem;
    }

    .cd-login-sub {
      font-family: var(--font-body); font-size: 0.8rem;
      font-weight: 300; color: var(--chocolate-mid);
      line-height: 1.6; margin-bottom: 1.8rem;
    }

    .cd-login-input {
      width: 100%;
      padding: 0.85rem 1rem;
      background: rgba(247,240,232,0.7);
      border: 1.5px solid rgba(44,24,16,0.12);
      border-radius: 8px;
      font-family: var(--font-body); font-size: 0.9rem;
      font-weight: 300; color: var(--chocolate);
      margin-bottom: 0.9rem;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .cd-login-input:focus {
      border-color: var(--rose);
      box-shadow: 0 0 0 3px rgba(193,123,114,0.12);
      background: var(--white-warm);
    }
    .cd-login-input::placeholder { color: rgba(44,24,16,0.35); }

    .cd-login-btn {
      width: 100%;
      padding: 0.95em 1.5em;
      background: linear-gradient(135deg, var(--rose), var(--rose-dark));
      color: var(--white-warm);
      border: none; border-radius: 8px;
      font-family: var(--font-body); font-size: 0.75rem;
      font-weight: 500; letter-spacing: 2.5px;
      text-transform: uppercase; cursor: pointer;
      box-shadow: 0 6px 24px rgba(193,123,114,0.3);
      transition: box-shadow 0.3s, transform 0.2s;
    }
    .cd-login-btn:hover:not(:disabled) {
      box-shadow: 0 10px 36px rgba(193,123,114,0.4);
      transform: translateY(-1px);
    }
    .cd-login-btn:disabled { opacity: 0.65; cursor: not-allowed; }

    .cd-login-msg {
      font-family: var(--font-body); font-size: 0.78rem;
      color: var(--rose); margin-top: 1rem;
      min-height: 1.2em;
    }

    /* ── Números do participante ─────────────────────────── */
    .cd-tickets {
      text-align: center;
      margin-top: 0.4rem;
    }

    .cd-participant-name {
      font-family: var(--font-display);
      font-size: 1.1rem; font-weight: 300;
      color: var(--chocolate);
      margin-bottom: 0.4rem;
      letter-spacing: -0.01em;
    }

    .cd-tickets-label {
      display: block;
      font-family: var(--font-body); font-size: 0.5rem;
      letter-spacing: 4px; text-transform: uppercase;
      color: var(--rose); opacity: 0.7;
      margin-bottom: 0.65rem;
    }

    .cd-tickets-list {
      display: flex; flex-wrap: wrap;
      justify-content: center; gap: 0.5rem;
      list-style: none; padding: 0; margin: 0;
    }

    .cd-ticket-num {
      font-family: var(--font-body); font-size: 0.65rem;
      font-weight: 500; letter-spacing: 2px;
      color: var(--chocolate);
      background: rgba(44,24,16,0.06);
      border: 1px solid rgba(44,24,16,0.12);
      border-radius: 6px;
      padding: 0.35em 0.85em;
    }

    /* ── Mobile ──────────────────────────────────────────── */
    @media (max-width: 480px) {
      .cd-top { padding: 0.8rem 1.2rem; }
      .cd-nums-label { max-width: 160px; }
      .cd-val { font-size: clamp(2rem, 9vw, 3rem); }
    }
  </style>
</head>
<body>

  <canvas id="grain-canvas" aria-hidden="true"></canvas>

  <!-- Overlay de login (visível quando não há sessão) -->
  <div id="cd-login-overlay" hidden>
    <p class="cd-login-logo">Daisuki <span>·</span> Confeitaria</p>
    <div class="cd-login-card">
      <h2 class="cd-login-title">Ver meus números</h2>
      <p class="cd-login-sub">
        Digite o e-mail usado no cadastro<br>para ver seus bilhetes da rifa.
      </p>
      <input
        type="email"
        id="cd-login-email"
        class="cd-login-input"
        placeholder="seu@email.com"
        autocomplete="email"
      >
      <button class="cd-login-btn" id="cd-login-btn">
        Ver meus números
      </button>
      <p class="cd-login-msg" id="cd-login-msg" aria-live="polite"></p>
    </div>
  </div>

  <div class="cd-top">
    <a href="index.html" class="cd-back">← voltar</a>
    <p class="cd-nums-label" id="cd-nums-label"></p>
  </div>

  <main class="cd-main">

    <div class="brigadeiro-wrap">
      <img id="brigadeiro-img" src="brigadeiro.png" alt="Brigadeiro Daisuki" draggable="false">
    </div>

    <div class="cd-countdown">
      <span class="cd-count-label">sorteio em</span>

      <div class="cd-digits" aria-label="Contagem regressiva para o sorteio">
        <div class="cd-unit">
          <span class="cd-val" id="cd-days">--</span>
          <span class="cd-lbl">dias</span>
        </div>
        <span class="cd-sep" aria-hidden="true">:</span>
        <div class="cd-unit">
          <span class="cd-val" id="cd-hours">--</span>
          <span class="cd-lbl">horas</span>
        </div>
        <span class="cd-sep" aria-hidden="true">:</span>
        <div class="cd-unit">
          <span class="cd-val" id="cd-minutes">--</span>
          <span class="cd-lbl">min</span>
        </div>
        <span class="cd-sep" aria-hidden="true">:</span>
        <div class="cd-unit">
          <span class="cd-val" id="cd-seconds">--</span>
          <span class="cd-lbl">seg</span>
        </div>
      </div>

      <p class="cd-date">1 de junho de 2026 · 18h00 JST</p>
      <span id="cd-status-msg" aria-live="polite"></span>
    </div>

    <div class="cd-tickets" id="cd-tickets-section" hidden>
      <p class="cd-participant-name" id="cd-participant-name" hidden></p>
      <span class="cd-tickets-label">seus números</span>
      <ul class="cd-tickets-list" id="cd-tickets-list"></ul>
    </div>

  </main>

  <script src="js/countdown.js"></script>
</body>
</html>
