<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daisuki Confeitaria — Resultado da Rifa</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/pages.css">

  <style>
    body {
      background: var(--cream);
      cursor: auto;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .resultado-wrapper {
      text-align: center;
      max-width: 580px;
      width: 100%;
    }

    .resultado-logo {
      font-family: var(--font-display);
      font-size: 1.8rem;
      color: var(--chocolate);
      margin-bottom: 2.5rem;
      font-weight: 300;
      letter-spacing: -0.01em;
    }

    .resultado-card {
      background: var(--white-warm);
      border-radius: var(--radius-lg);
      padding: clamp(2.5rem, 6vw, 4.5rem);
      box-shadow: var(--shadow-luxury);
      position: relative;
      overflow: hidden;
      margin-bottom: 2rem;
    }

    .resultado-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--rose), var(--gold), var(--rose));
      background-size: 200% 100%;
      animation: gradientShift 3s linear infinite;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    .resultado-label {
      font-family: var(--font-body);
      font-size: 0.62rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 1rem;
      display: block;
    }

    #result-status {
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--chocolate-mid);
      margin-bottom: 2rem;
      line-height: 1.6;
      min-height: 1.5rem;
    }

    .winner-box {
      background: rgba(193,123,114,0.06);
      border: 1.5px solid rgba(193,123,114,0.2);
      border-radius: var(--radius-md);
      padding: 2rem;
      margin: 1.5rem 0;
      display: none;
    }

    .winner-box.visible { display: block; }

    .winner-label-small {
      font-family: var(--font-body);
      font-size: 0.58rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 0.6rem;
      display: block;
    }

    #winner-number {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 400;
      color: var(--chocolate);
      letter-spacing: 0.1em;
      line-height: 1;
      margin-bottom: 0.6rem;
      display: block;
    }

    #winner-name {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1.3rem;
      color: var(--rose);
      display: block;
    }

    .resultado-footer {
      font-family: var(--font-body);
      font-size: 0.75rem;
      color: var(--chocolate-mid);
      opacity: 0.6;
      line-height: 1.6;
    }

    #confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 9997;
    }
  </style>
</head>
<body>

  <div id="confetti-container" aria-hidden="true"></div>

  <div class="resultado-wrapper" role="main">

    <p class="resultado-logo">
      Daisuki · Confeitaria
    </p>

    <div class="resultado-card">
      <span class="resultado-label">Rifa Especial 2026</span>

      <h1 style="font-family:var(--font-display);font-size:clamp(1.8rem,3.5vw,3rem);font-weight:300;color:var(--chocolate);margin-bottom:1rem;line-height:1.2">
        Resultado do<br>
        <span style="color:var(--rose)">Sorteio</span>
      </h1>

      <p id="result-status">Carregando resultado...</p>

      <div class="winner-box" id="winner-box" role="region" aria-label="Número vencedor">
        <span class="winner-label-small">🎉 Número vencedor</span>
        <span id="winner-number"></span>
        <span id="winner-name"></span>
      </div>
    </div>

    <p class="resultado-footer">
      Sorteio realizado em 15/06/2026 às 20h00 JST via Instagram.<br>
      Dúvidas? contato@daisuki.com.br
    </p>

    <a href="/" style="display:inline-block;margin-top:2rem;font-family:var(--font-body);font-size:0.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--rose);text-decoration:none;opacity:0.75;transition:opacity .3s" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.75'">
      ← Voltar ao site
    </a>

  </div>

  <script>
    // Show winner box when winner data loads
    document.addEventListener('winner-loaded', () => {
      const box = document.getElementById('winner-box');
      if (box) box.classList.add('visible');
    });
  </script>
  <script src="js/resultado.js"></script>
</body>
</html>
